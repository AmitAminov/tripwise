name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # next-env.d.ts is generated by `next dev`/`next build` and gitignored;
      # recreate it so tsc sees the Next.js ambient types on a fresh clone.
      - name: Generate next-env.d.ts
        run: |
          printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts

      - name: Typecheck
        run: bun run typecheck

      # No secrets required: vitest does not load .env files, and the
      # provider factories fall back to mocks/curated data when keys are absent.
      - name: Unit tests
        run: bun run test
